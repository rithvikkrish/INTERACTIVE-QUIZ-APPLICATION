<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="screen active">
            <div class="welcome-content">
                <h1>Welcome to Quiz Master</h1>
                <p>Test your knowledge across various topics!</p>
                <div class="quiz-info">
                    <div class="info-item">
                        <span class="icon">📚</span>
                        <p>Multiple Topics</p>
                    </div>
                    <div class="info-item">
                        <span class="icon">⚡</span>
                        <p>Instant Feedback</p>
                    </div>
                    <div class="info-item">
                        <span class="icon">🏆</span>
                        <p>Real-time Scoring</p>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-container">
                <!-- Progress Bar -->
                <div class="progress-section">
                    <div class="progress-header">
                        <span class="question-counter">Question <span id="currentQuestion">1</span> of <span id="totalQuestions">0</span></span>
                        <span class="score-display">Score: <span id="currentScore">0</span></span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- Question Section -->
                <div class="question-section">
                    <h2 id="questionText" class="question-text"></h2>
                </div>

                <!-- Options Section -->
                <div class="options-section">
                    <div id="optionsContainer" class="options-container"></div>
                </div>

                <!-- Feedback Section -->
                <div id="feedbackSection" class="feedback-section hidden">
                    <div id="feedbackContent" class="feedback-content"></div>
                    <button class="btn btn-secondary" onclick="nextQuestion()">Next Question</button>
                </div>

                <!-- Navigation -->
                <div class="navigation">
                    <button class="btn btn-outline" onclick="quitQuiz()">Quit Quiz</button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-container">
                <div class="results-header">
                    <h1>Quiz Complete!</h1>
                </div>

                <div class="score-circle">
                    <div class="score-content">
                        <span class="final-score" id="finalScore">0</span>
                        <span class="total-text">/ <span id="maxScore">0</span></span>
                        <span class="percentage" id="percentageScore">0%</span>
                    </div>
                </div>

                <div class="performance-message">
                    <p id="performanceText"></p>
                </div>

                <div class="results-stats">
                    <div class="stat">
                        <span class="stat-label">Correct Answers</span>
                        <span class="stat-value" id="correctCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Incorrect Answers</span>
                        <span class="stat-value incorrect" id="incorrectCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Accuracy</span>
                        <span class="stat-value" id="accuracyPercentage">0%</span>
                    </div>
                </div>

                <div class="detailed-results">
                    <h3>Review Your Answers</h3>
                    <div id="reviewContainer" class="review-container"></div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="restartQuiz()">Retake Quiz</button>
                    <button class="btn btn-secondary" onclick="goHome()">Back to Home</button>
                </div>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
